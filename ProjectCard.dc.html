<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="perspective:1100px;width:100%;height:100%;">
  <div style="{{ flipperStyle }}">
    <!-- FRONT -->
    <div style="{{ frontStyle }}">
      <div style="position:relative;height:100%;display:flex;flex-direction:column;background:#fff;border-radius:18px;border:1px solid #D2CCBF;overflow:hidden;box-shadow:0 2px 0 rgba(255,255,255,0.8) inset,0 30px 64px rgba(20,24,32,0.15),11px 13px 0 {{ shadowColor }};">
        <div style="position:relative;flex:0 0 176px;overflow:hidden;background:{{ screenBg }};">
          <div style="position:absolute;top:12px;left:12px;width:50px;height:50px;border-radius:50%;background:#fff;border:3px solid {{ theme }};display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:{{ theme }};box-shadow:0 4px 14px rgba(20,24,32,0.14);">{{ num }}</div>
          <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;">
            <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.22em;color:{{ theme }};opacity:0.6;">TITLE SCREEN</span>
            <span style="font-family:'DotGothic16',monospace;font-size:19px;letter-spacing:0.1em;color:{{ theme }};opacity:0.45;">{{ kana }}</span>
          </div>
          <div style="position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,{{ washColor }} 100%);"></div>
        </div>
        <div style="flex:1;min-height:0;padding:15px 18px 11px;display:flex;flex-direction:column;border-top:2px solid {{ borderColor }};">
          <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.18em;color:{{ theme }};">{{ kana }}</span>
          <h3 style="font-family:'Syne',sans-serif;font-weight:800;font-size:24px;line-height:1.12;margin:3px 0 9px;">{{ title }}</h3>
          <p style="font-size:12.5px;color:#3C3F49;line-height:1.55;margin:0 0 10px;">{{ tagline }}</p>
          <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;">
            <sc-for list="{{ awards }}" as="aw" hint-placeholder-count="1">
              <span style="font-size:11px;font-weight:800;padding:4px 9px;background:#fff;border:1.5px solid {{ theme }};color:#15171C;border-radius:999px;">{{ aw }}</span>
            </sc-for>
          </div>
          <div style="margin-top:auto;display:flex;flex-wrap:wrap;gap:4px;">
            <sc-for list="{{ tech }}" as="t" hint-placeholder-count="4">
              <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:#6A6E7C;border:1px solid #E5E1D8;border-radius:5px;padding:3px 8px;background:#FBF7F2;">{{ t }}</span>
            </sc-for>
          </div>
        </div>
        <div style="flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 16px;border-top:2px solid {{ borderColor }};">
          <a href="{{ primaryUrl }}" target="_blank" rel="noopener" style="font-family:'IBM Plex Mono',monospace;font-size:12px;text-decoration:none;color:#fff;background:{{ theme }};border-radius:7px;padding:9px 15px;transition:opacity 0.2s;" style-hover="opacity:0.88;">{{ primaryLabel }}</a>
          <button type="button" onClick="{{ onFlip }}" style="font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.06em;color:{{ theme }};background:{{ flipBg }};border:1px solid {{ borderColor }};border-radius:8px;padding:9px 15px;cursor:pointer;transition:background 0.2s,color 0.2s;" style-hover="background:{{ theme }};color:#fff;">詳しく ↻</button>
        </div>
      </div>
    </div>
    <!-- BACK -->
    <div style="{{ backStyle }}">
      <div style="position:relative;height:100%;display:flex;flex-direction:column;background:{{ backBg }};border-radius:18px;border:1px solid #D2CCBF;overflow:hidden;box-shadow:0 30px 64px rgba(20,24,32,0.15),11px 13px 0 {{ shadowColor }};">
        <div style="padding:18px 18px 0;">
          <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.2em;color:{{ theme }};">DETAIL LOG</span>
          <h3 style="font-family:'Syne',sans-serif;font-weight:800;font-size:23px;line-height:1.12;margin:4px 0 12px;">{{ title }}</h3>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:13px;">
            <div style="background:#FBF7F2;border:1px solid #E5E1D8;border-radius:7px;padding:6px 8px;"><div style="font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.1em;color:#A2A6B2;">ROLE</div><div style="font-size:12px;font-weight:700;line-height:1.3;">{{ role }}</div></div>
            <div style="background:#FBF7F2;border:1px solid #E5E1D8;border-radius:7px;padding:6px 8px;"><div style="font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.1em;color:#A2A6B2;">TEAM</div><div style="font-size:12px;font-weight:700;line-height:1.3;">{{ team }}</div></div>
            <div style="background:#FBF7F2;border:1px solid #E5E1D8;border-radius:7px;padding:6px 8px;"><div style="font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.1em;color:#A2A6B2;">PERIOD</div><div style="font-size:12px;font-weight:700;line-height:1.3;">{{ period }}</div></div>
          </div>
        </div>
        <div style="flex:1;min-height:0;overflow-y:auto;padding:0 18px;display:flex;flex-direction:column;gap:11px;">
          <sc-for list="{{ sections }}" as="sec" hint-placeholder-count="2">
            <div>
              <h4 style="font-size:12.5px;font-weight:700;line-height:1.4;margin:0 0 3px;padding-left:9px;border-left:2px solid {{ theme }};">{{ sec.title }}</h4>
              <p style="font-size:12px;color:#6A6E7C;line-height:1.6;margin:0;">{{ sec.body }}</p>
            </div>
          </sc-for>
        </div>
        <div style="flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 16px;border-top:2px solid {{ borderColor }};">
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            <sc-for list="{{ links }}" as="lk" hint-placeholder-count="2">
              <a href="{{ lk.url }}" target="_blank" rel="noopener" style="{{ lk.style }}">{{ lk.label }}</a>
            </sc-for>
          </div>
          <button type="button" onClick="{{ onFlip }}" style="font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.06em;color:{{ theme }};background:{{ flipBg }};border:1px solid {{ borderColor }};border-radius:8px;padding:9px 15px;cursor:pointer;white-space:nowrap;transition:background 0.2s,color 0.2s;" style-hover="background:{{ theme }};color:#fff;">↺ 戻る</button>
        </div>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:340,&quot;height&quot;:486},&quot;project&quot;:{&quot;editor&quot;:null,&quot;default&quot;:{}}}">
class Component extends DCLogic {
  state = { flip: false };

  hexA(hex, alpha) {
    const a = Math.round(alpha * 255).toString(16).padStart(2, '0');
    return hex + a;
  }

  renderVals() {
    const p = this.props.project || {};
    const theme = p.theme || '#EE4429';
    const flipped = !!this.state.flip;
    return {
      num: p.num || '01',
      title: p.title || '',
      kana: p.kana || '',
      tagline: p.tagline || '',
      role: p.role || '—',
      team: p.team || '—',
      period: p.period || '—',
      tech: p.tech || [],
      awards: p.awards || [],
      sections: p.sections || [],
      primaryLabel: p.primaryLabel || 'PLAY',
      primaryUrl: p.primaryUrl || '#',
      theme,
      shadowColor: this.hexA(theme, 0.12),
      washColor: this.hexA(theme, 0.16),
      borderColor: this.hexA(theme, 0.28),
      flipBg: this.hexA(theme, 0.08),
      screenBg: `repeating-linear-gradient(135deg, ${this.hexA(theme, 0.1)}, ${this.hexA(theme, 0.1)} 11px, transparent 11px, transparent 22px), ${this.hexA(theme, 0.05)}`,
      backBg: `linear-gradient(160deg, #ffffff 0%, ${this.hexA(theme, 0.05)} 100%)`,
      links: (p.links || []).map((l, li) => ({
        ...l,
        style: li === 0
          ? `font-family:'IBM Plex Mono',monospace;font-size:11px;text-decoration:none;color:#fff;background:${theme};border:1px solid ${theme};border-radius:6px;padding:5px 11px;`
          : `font-family:'IBM Plex Mono',monospace;font-size:11px;text-decoration:none;color:#6A6E7C;border:1px solid #E5E1D8;border-radius:6px;padding:5px 11px;`,
      })),
      flipperStyle: {
        position: 'relative', width: '100%', height: '100%',
        transformStyle: 'preserve-3d',
        transition: 'transform 0.65s cubic-bezier(0.4,0.2,0.2,1)',
        transform: flipped ? 'rotateY(180deg)' : 'rotateY(0deg)',
      },
      frontStyle: {
        position: 'absolute', inset: 0,
        backfaceVisibility: 'hidden', WebkitBackfaceVisibility: 'hidden',
        opacity: flipped ? 0 : 1,
        transition: 'opacity 0.3s ease 0.18s',
      },
      backStyle: {
        position: 'absolute', inset: 0,
        backfaceVisibility: 'hidden', WebkitBackfaceVisibility: 'hidden',
        transform: 'rotateY(180deg)',
        opacity: flipped ? 1 : 0,
        transition: 'opacity 0.3s ease 0.18s',
      },
      onFlip: (e) => { if (e && e.stopPropagation) e.stopPropagation(); this.setState((s) => ({ flip: !s.flip })); },
    };
  }
}
</script>
</body>
</html>
